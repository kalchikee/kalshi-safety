name: Position Monitor (1 PM – 4 AM ET, three shifts)

# Three back-to-back 5-hour shifts cover live game hours from 1 PM ET
# through 4 AM ET. Each shift is sized to stay under GitHub Actions' 6h
# per-job hard cap. Coverage:
#
#   Afternoon:   1 PM  ET  →  6 PM  ET   (17 UTC start)
#   Evening:     6 PM  ET  →  11 PM ET   (22 UTC start)
#   Late-night:  11 PM ET  →  4 AM  ET   (03 UTC start, next UTC day)
#
# The late-night shift catches NBA West Coast and NHL games that finish
# after 11 PM ET — without it, stop-loss / take-profit on those positions
# would have to wait for the 5 AM ET recap (often after settlement).
#
# Exit timing is now driven by MONITOR_DURATION_MINUTES (fixed 5h per
# shift) computed inside monitor.ts via Date.now() rather than the old
# "exit at hour X in ET" check, which had a midnight wraparound bug for
# the late-night shift (hour 23 >= 4 evaluates true and would have
# bailed immediately).
on:
  schedule:
    - cron: '0 17 * * *'   # 17 UTC = 1 PM ET — afternoon shift
    - cron: '0 22 * * *'   # 22 UTC = 6 PM ET — evening shift
    - cron: '0 3 * * *'    # 03 UTC = 11 PM ET previous day — late-night
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 330    # 5.5h — stays under GitHub Actions 6h cap

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get today's date (ET)
        id: date
        run: echo "date=$(TZ='America/New_York' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore safety-state (paper + live bets)
        uses: actions/cache/restore@v4
        with:
          path: safety-state
          key: kalshi-safety-state-${{ steps.date.outputs.date }}
          restore-keys: |
            kalshi-safety-state-

      - name: Run position monitor
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
          KALSHI_SAFETY_DISCORD_URL: ${{ secrets.KALSHI_SAFETY_DISCORD_URL }}
          KALSHI_PAPER_TRADING: 'true'
          KALSHI_MIN_BALANCE: '5'
          KALSHI_MONITOR_INTERVAL_MS: '120000'
          MONITOR_DURATION_MINUTES: '300'   # 5 hours per shift
        run: node --loader ts-node/esm src/service/actions/monitor.ts

      - name: Save safety-state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: safety-state
          key: kalshi-safety-state-${{ steps.date.outputs.date }}-monitor-${{ github.run_id }}
