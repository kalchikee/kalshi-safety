name: Daily Recap (4 AM CST / 10 UTC)

on:
  schedule:
    - cron: '0 10 * * *'   # 10 UTC = 4 AM CST / 5 AM CDT
  workflow_dispatch:
    inputs:
      date:
        description: 'Recap date override (YYYY-MM-DD, ET of games)'
        required: false

jobs:
  recap:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Compute recap date (yesterday ET)
        id: date
        run: |
          # Games played yesterday in ET; we're posting recap at 4 AM CST
          echo "date=$(TZ='America/New_York' date -d 'yesterday' +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore safety-state
        uses: actions/cache/restore@v4
        with:
          path: safety-state
          key: kalshi-safety-state-${{ steps.date.outputs.date }}
          restore-keys: |
            kalshi-safety-state-

      - name: Run recap
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
          KALSHI_SAFETY_DISCORD_URL: ${{ secrets.KALSHI_SAFETY_DISCORD_URL }}
          KALSHI_PAPER_TRADING: 'true'
          KALSHI_MIN_BALANCE: '5'
        run: node --loader ts-node/esm src/service/actions/recap.ts ${{ github.event.inputs.date || steps.date.outputs.date }}

      - name: Save safety-state (post-settlement)
        uses: actions/cache/save@v4
        if: always()
        with:
          path: safety-state
          key: kalshi-safety-state-${{ steps.date.outputs.date }}-recap-${{ github.run_id }}
