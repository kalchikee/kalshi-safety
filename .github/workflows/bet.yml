name: Place Bets (11 AM ET / 10 AM CT)

# Why 15:00 UTC and not earlier: this workflow has to fire AFTER every
# sport's prediction workflow has committed today's predictions/<date>.json
# back to its own repo. Latest daily prediction run is MLS at 14:00 UTC.
# A 6:30 AM ET (10:30 UTC) bet run was racing every sport and missing
# them all except MLB.
#
#  Sport         Cron (UTC)
#  ────────────  ──────────
#  MLB           10:00
#  EPL (Sat)     08:00
#  WNBA          11:00
#  Parlay        11:00
#  NBA           12:00
#  NHL           12:00
#  NCAAM/W       13:00
#  MLS           14:00
on:
  schedule:
    - cron: '0 15 * * *'    # 15:00 UTC = 11:00 AM ET (EDT)
    # UFC predictions don't fire until 18:00 UTC Saturdays — those bets
    # get picked up by tomorrow's 15:00 UTC run when the JSON is still fresh.
  workflow_dispatch:
    inputs:
      date:
        description: 'Date override (YYYY-MM-DD, ET)'
        required: false
      dry_run:
        description: 'Preview bets without mutating paper state'
        required: false
        type: boolean
        default: false

jobs:
  bet:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get today's date (ET)
        id: date
        run: echo "date=$(TZ='America/New_York' date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore safety-state (paper + live bet records)
        uses: actions/cache/restore@v4
        with:
          path: safety-state
          key: kalshi-safety-state-${{ steps.date.outputs.date }}
          restore-keys: |
            kalshi-safety-state-

      - name: Run bet action
        env:
          KALSHI_API_KEY_ID: ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY: ${{ secrets.KALSHI_PRIVATE_KEY }}
          KALSHI_SAFETY_DISCORD_URL: ${{ secrets.KALSHI_SAFETY_DISCORD_URL }}
          KALSHI_PAPER_TRADING: 'true'
          KALSHI_MIN_PROB: '0.65'
          KALSHI_MAX_BET_DOLLARS: '10'
          KALSHI_BET_SIZE: '1'
          KALSHI_MIN_BALANCE: '5'
          BET_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node --loader ts-node/esm src/service/actions/bet.ts ${{ github.event.inputs.date || steps.date.outputs.date }}

      - name: Save safety-state
        uses: actions/cache/save@v4
        # Dry-run should be fully side-effect-free — skip the cache save too
        if: always() && github.event.inputs.dry_run != 'true'
        with:
          path: safety-state
          key: kalshi-safety-state-${{ steps.date.outputs.date }}-bet-${{ github.run_id }}
